<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DMCN Mail</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0C1010" />
    <meta name="description" content="Decentralized Mesh Communication Network — your end-to-end encrypted inbox." />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-title" content="DMCN" />

    <!-- Runtime config rendered by the Go backend (html/template). The nonce lets
         this inline script run under a strict, no-unsafe-inline script CSP. In raw
         vite dev the template placeholders aren't substituted; the frontend guards
         against that (see src/lib/config.ts). -->
    <script nonce="{{ .Nonce }}">
      const env = {
        NONCE: '{{ .Nonce }}',
        VERSION: '{{ .Version }}',
        DEFAULT_DOMAIN: '{{ .DefaultDomain }}',
        DEV_MODE: '{{ .DevMode }}',
        POLL_INTERVAL_MS: '{{ .PollIntervalMs }}',
        DOMAINS: '{{ .Domains }}',
        ACCOUNT_URL: '{{ .AccountURL }}',
        REGISTRATION_CLOSED: '{{ .RegistrationClosed }}',
        SIGNUP_URL: '{{ .SignupURL }}',
      };
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0C1010; color: #333; }
    </style>
